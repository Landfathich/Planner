{% extends "base.html" %}
{% load static %}

{% block title %}График на сегодня{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'journal/css/today_schedule.css' %}">
{% endblock %}

{% block content %}
<div class="today-schedule-container">
    <div class="schedule-header">
        <div class="date-info">
            <span class="date-icon">📅</span>
            <h2 id="current-date"></h2>
        </div>
        <div class="schedule-actions">
            <button id="settings-btn" class="settings-btn" title="Настройки графиков">
                <span>⚙️</span> Настройки
            </button>
        </div>
    </div>

    <div class="schedule-progress">
        <div class="progress-stats">
            <span class="progress-label">Прогресс дня</span>
            <span class="progress-percent" id="progress-percent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
    </div>

    <div class="schedule-timeline" id="schedule-timeline">
        <div class="loading">Загрузка графика...</div>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования пункта -->
<div id="schedule-item-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 class="modal-title" id="modal-title">Редактировать пункт</h3>
        <form id="schedule-item-form">
            <input type="hidden" id="item-id" name="id">
            <div class="form-group">
                <label for="item-time">Время:</label>
                <input type="time" id="item-time" name="time" required>
            </div>
            <div class="form-group">
                <label for="item-title">Название:</label>
                <input type="text" id="item-title" name="title" required>
            </div>
            <div class="form-group">
                <label for="item-description">Описание:</label>
                <textarea id="item-description" name="description" rows="3"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="styled-button">Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'journal/js/todaySchedule.js' %}" type="module"></script>
{% endblock %}
